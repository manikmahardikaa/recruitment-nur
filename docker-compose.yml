version: "3.8"

services:
  next_app:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env
    restart: unless-stopped

  mysql_db:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_DATABASE: db_recruitment_nur
      MYSQL_USER: recruitment
      MYSQL_PASSWORD: recruitment1234
      MYSQL_ROOT_PASSWORD: recruitment1234
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
